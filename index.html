    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('nelna-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var useDark = savedTheme ? savedTheme === 'dark' : prefersDark;
          if (useDark) {
            document.documentElement.classList.add('dark');
          }

          var savedLang = localStorage.getItem('i18nextLng');
          if (savedLang) {
            var normalized = savedLang.split('-')[0];
            if (normalized === 'en' || normalized === 'si' || normalized === 'ta') {
              document.documentElement.lang = normalized;
            }
          }
        } catch (error) {
          // Ignore bootstrap errors and continue with defaults.
        }
      })();
    </script>
